<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARK — Vanilla JS UI Kit Preview</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Inter:300,400,500,700&display=swap" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&display=swap" />
    
    <script src="https://unpkg.com/@emotion/react@11/dist/emotion-react.umd.min.js"></script>
    <script src="https://unpkg.com/@emotion/styled@11/dist/emotion-styled.umd.min.js"></script>
    <script src="https://unpkg.com/@mui/material@latest/umd/material-ui.development.js"></script>
    
    <style>
        body { margin: 0; padding: 0; background-color: #F8FAFC; font-family: 'Inter', sans-serif; }
        #app-root { display: flex; min-height: 100vh; }
        
        /* Styles spécifiques pour le look "Blueprint" */
        .technical-id { 
            font-family: 'JetBrains Mono', monospace !important; 
            font-size: 0.8rem; 
            color: #64748B;
            background: #F1F5F9;
            padding: 2px 6px;
            border-radius: 4px;
            border: 1px solid #E2E8F0;
        }
    </style>
</head>
<body>
    <div id="app-root">
        <div id="sidebar-anchor"></div>
        <main id="main-content" style="flex-grow: 1; padding: 40px;"></main>
    </div>

    <script>
        const { createTheme, hexToRgb, chipClasses, tableCellClasses } = MaterialUI;

        // 1. DÉFINITION DU THÈME ARK (Partagé avec l'app future)
        const theme = createTheme({
            palette: {
                primary: { main: '#1A237E' },
                secondary: { main: '#007FFF' },
                background: { default: '#F8FAFC', paper: '#FFFFFF' },
                text: { primary: '#1E293B', secondary: '#64748B' },
                divider: '#E2E8F0',
            },
            shape: { borderRadius: 4 },
            typography: { fontFamily: 'Inter, sans-serif' }
        });

        // Helper pour créer des éléments MUI en Vanilla
        const createMuiElement = (componentName, props = {}, children = []) => {
            const Component = MaterialUI[componentName];
            if (!Component) return document.createElement('div');
            // Simulation simplifiée pour une page statique
            return Component; 
        };

        // 2. RENDU DE LA SIDEBAR (Vanilla DOM)
        const renderSidebar = () => {
            const sidebar = document.getElementById('sidebar-anchor');
            sidebar.innerHTML = `
                <div style="width: 260px; background-color: #1A237E; height: 100vh; color: white; padding: 32px 0; display: flex; flex-direction: column;">
                    <div style="padding: 0 32px 32px 32px;">
                        <div style="font-size: 1.5rem; font-weight: 900; letter-spacing: -1px; color: #007FFF;">ARK</div>
                        <div style="font-size: 0.7rem; opacity: 0.5; text-transform: uppercase; letter-spacing: 1px;">EPM Architect</div>
                    </div>
                    <nav style="flex-grow: 1; padding: 0 16px;">
                        <div class="nav-item active" style="padding: 12px 16px; border-radius: 8px; background: rgba(0, 127, 255, 0.15); color: #007FFF; font-weight: 600; margin-bottom: 4px; cursor: pointer;">Domaines Métier</div>
                        <div class="nav-item" style="padding: 12px 16px; border-radius: 8px; color: #CBD5E1; margin-bottom: 4px; cursor: pointer;">Applications</div>
                        <div class="nav-item" style="padding: 12px 16px; border-radius: 8px; color: #CBD5E1; margin-bottom: 4px; cursor: pointer;">Infrastructure</div>
                        <div class="nav-item" style="padding: 12px 16px; border-radius: 8px; color: #CBD5E1; margin-bottom: 4px; cursor: pointer;">Graphe de Dépendances</div>
                    </nav>
                </div>
            `;
        };

        // 3. RENDU DU CONTENU (Vanilla DOM + MUI Classes)
        const renderContent = () => {
            const main = document.getElementById('main-content');
            
            main.innerHTML = `
                <div style="display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 40px;">
                    <div>
                        <h1 style="margin: 0; font-size: 1.8rem; font-weight: 800; color: #1E293B;">Domaines Métier</h1>
                        <p style="color: #64748B; margin-top: 8px;">Cartographie fonctionnelle du système d'information.</p>
                    </div>
                    <div>
                        <button style="background: white; border: 1px solid #E2E8F0; padding: 10px 20px; border-radius: 6px; font-weight: 600; cursor: pointer; margin-right: 12px;">Exporter</button>
                        <button style="background: #007FFF; border: none; color: white; padding: 10px 20px; border-radius: 6px; font-weight: 600; cursor: pointer; box-shadow: 0 2px 4px rgba(0,127,255,0.2);">+ Nouveau Domaine</button>
                    </div>
                </div>

                <div style="display: flex; gap: 24px; margin-bottom: 40px;">
                    <div style="background: white; border: 1px solid #E2E8F0; padding: 24px; border-radius: 4px; flex: 1;">
                        <div style="font-size: 0.7rem; font-weight: 700; color: #64748B; text-transform: uppercase;">Total Domaines</div>
                        <div style="font-size: 2rem; font-weight: 700; margin-top: 8px;">14</div>
                    </div>
                    <div style="background: white; border: 1px solid #E2E8F0; padding: 24px; border-radius: 4px; flex: 1;">
                        <div style="font-size: 0.7rem; font-weight: 700; color: #64748B; text-transform: uppercase;">Applications Recensées</div>
                        <div style="font-size: 2rem; font-weight: 700; margin-top: 8px;">156</div>
                    </div>
                </div>

                <div style="background: white; border: 1px solid #E2E8F0; border-radius: 8px; overflow: hidden;">
                    <table style="width: 100%; border-collapse: collapse; text-align: left;">
                        <thead style="background: #F1F5F9;">
                            <tr>
                                <th style="padding: 12px 24px; font-size: 0.75rem; color: #64748B; text-transform: uppercase; font-weight: 600;">Code</th>
                                <th style="padding: 12px 24px; font-size: 0.75rem; color: #64748B; text-transform: uppercase; font-weight: 600;">Nom</th>
                                <th style="padding: 12px 24px; font-size: 0.75rem; color: #64748B; text-transform: uppercase; font-weight: 600;">Status</th>
                                <th style="padding: 12px 24px; font-size: 0.75rem; color: #64748B; text-transform: uppercase; font-weight: 600; text-align: right;">Action</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr style="border-top: 1px solid #E2E8F0;">
                                <td style="padding: 16px 24px;"><span class="technical-id">DOM-FIN</span></td>
                                <td style="padding: 16px 24px; font-weight: 600;">Finance & Trésorerie</td>
                                <td style="padding: 16px 24px;"><span style="background: #DCFCE7; color: #166534; padding: 4px 10px; border-radius: 12px; font-size: 0.7rem; font-weight: 700;">Validé</span></td>
                                <td style="padding: 16px 24px; text-align: right;"><a href="#" style="color: #007FFF; text-decoration: none; font-size: 0.9rem; font-weight: 600;">Détails</a></td>
                            </tr>
                            <tr style="border-top: 1px solid #E2E8F0;">
                                <td style="padding: 16px 24px;"><span class="technical-id">DOM-RHS</span></td>
                                <td style="padding: 16px 24px; font-weight: 600;">Ressources Humaines</td>
                                <td style="padding: 16px 24px;"><span style="background: #F1F5F9; color: #64748B; padding: 4px 10px; border-radius: 12px; font-size: 0.7rem; font-weight: 700;">En revue</span></td>
                                <td style="padding: 16px 24px; text-align: right;"><a href="#" style="color: #007FFF; text-decoration: none; font-size: 0.9rem; font-weight: 600;">Détails</a></td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            `;
        };

        // Initialisation
        window.onload = () => {
            renderSidebar();
            renderContent();
        };
    </script>
</body>
</html>
