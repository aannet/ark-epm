openapi: 3.0.0
info:
  title: Ark EPM API
  version: 1.1.0
  description: Enterprise Project Management API - Dimension Tags Support
servers:
  - url: http://localhost:3000/api/v1
    description: Development server

paths:
  /health:
    get:
      summary: Health check
      responses:
        '200':
          description: OK

  /auth/login:
    post:
      summary: Connexion email/password
      tags: [Auth]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Authentification réussie
          headers:
            Set-Cookie:
              description: Cookie httpOnly contenant le refresh token
              schema:
                type: string
                example: "refresh_token=xxx; HttpOnly; Path=/auth; Max-Age=604800"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '401':
          description: Identifiants invalides ou compte désactivé

  /auth/refresh:
    post:
      summary: Rafraîchir le token d'accès
      description: Génère un nouveau access token et rotate le refresh token (cookie httpOnly requis)
      tags: [Auth]
      security: []
      parameters:
        - name: Cookie
          in: header
          required: true
          description: Cookie contenant refresh_token
          schema:
            type: string
      responses:
        '200':
          description: Nouveau access token généré
          headers:
            Set-Cookie:
              description: Nouveau cookie httpOnly avec refresh token rotaté
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RefreshResponse'
        '401':
          description: Refresh token manquant, invalide ou expiré

  /auth/logout:
    post:
      summary: Déconnexion
      description: Révoque le refresh token et supprime le cookie
      tags: [Auth]
      security:
        - bearerAuth: []
      responses:
        '204':
          description: Déconnexion réussie
          headers:
            Set-Cookie:
              description: Cookie refresh_token supprimé
              schema:
                type: string
                example: "refresh_token=; HttpOnly; Path=/auth; Max-Age=0"
        '401':
          description: Token d'accès absent ou invalide

  /auth/me:
    get:
      summary: Profil de l'utilisateur connecté
      tags: [Auth]
      security:
        - bearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '401':
          description: Token absent ou invalide

  /domains:
    get:
      summary: Liste de tous les domaines
      tags: [Domains]
      security:
        - bearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/DomainResponse'
        '401':
          description: Non authentifié

    post:
      summary: Créer un domaine
      tags: [Domains]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateDomainDto'
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DomainResponse'
        '400':
          description: Validation échouée
        '401':
          description: Non authentifié
        '403':
          description: Permission insuffisante
        '409':
          description: Nom de domaine déjà utilisé
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /domains/{id}:
    get:
      summary: Détail d'un domaine avec ses tags
      tags: [Domains]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DomainResponse'
        '404':
          description: Domaine introuvable

    patch:
      summary: Modifier un domaine
      tags: [Domains]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateDomainDto'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DomainResponse'
        '404':
          description: Domaine introuvable
        '409':
          description: Nom de domaine déjà utilisé
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    delete:
      summary: Supprimer un domaine
      tags: [Domains]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Domaine supprimé
        '404':
          description: Domaine introuvable
        '409':
          description: Domaine utilisé par des entités liées
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /tags/dimensions:
    get:
      summary: Liste toutes les dimensions de tags
      tags: [Tags]
      security:
        - bearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/TagDimension'
        '401':
          description: Non authentifié

    post:
      summary: Créer une nouvelle dimension de tag
      tags: [Tags]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTagDimensionDto'
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TagDimension'
        '409':
          description: Dimension déjà existante
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /tags/dimensions/{dimensionId}/autocomplete:
    get:
      summary: Recherche autocomplétion des valeurs de tag
      tags: [Tags]
      security:
        - bearerAuth: []
      parameters:
        - name: dimensionId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: query
          in: query
          required: true
          schema:
            type: string
          description: Terme de recherche (min 2 caractères)
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/TagValueResponse'
        '401':
          description: Non authentifié
        '404':
          description: Dimension introuvable

  /tags/dimensions/{dimensionId}/resolve:
    post:
      summary: Résoudre/créer une valeur de tag (création avec hiérarchie automatique)
      tags: [Tags]
      security:
        - bearerAuth: []
      parameters:
        - name: dimensionId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                path:
                  type: string
                  description: 'Chemin hiérarchique (ex: europe/france/paris)'
                label:
                  type: string
                  description: 'Label affiché (ex: Paris)'
              required: [path, label]
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TagValueResponse'
        '401':
          description: Non authentifié
        '404':
          description: Dimension introuvable
        '400':
          description: Chemin invalide
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /tags/entities/{entityType}/{entityId}:
    get:
      summary: Récupérer les tags d'une entité
      tags: [Tags]
      security:
        - bearerAuth: []
      parameters:
        - name: entityType
          in: path
          required: true
          schema:
            type: string
            enum: [domain, application, business-capability, provider, data-object, it-component, interface]
        - name: entityId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    entityType:
                      type: string
                    entityId:
                      type: string
                    tagValue:
                      $ref: '#/components/schemas/TagValueResponse'
                    taggedAt:
                      type: string
                      format: date-time
        '401':
          description: Non authentifié

    put:
      summary: Remplacer tous les tags d'une entité pour une dimension
      tags: [Tags]
      security:
        - bearerAuth: []
      parameters:
        - name: entityType
          in: path
          required: true
          schema:
            type: string
        - name: entityId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                dimensionId:
                  type: string
                  format: uuid
                tagValueIds:
                  type: array
                  items:
                    type: string
                    format: uuid
              required: [dimensionId, tagValueIds]
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    entityType:
                      type: string
                    entityId:
                      type: string
                    tagValue:
                      $ref: '#/components/schemas/TagValueResponse'
                    taggedAt:
                      type: string
                      format: date-time
        '401':
          description: Non authentifié
        '404':
          description: Dimension ou valeur de tag introuvable

components:
  schemas:

    TagValueResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        dimensionId:
          type: string
          format: uuid
        dimensionName:
          type: string
          description: 'Nom de la dimension (ex: Geography)'
        dimensionColor:
          type: string
          nullable: true
          description: 'Couleur hexadécimale (ex: #2196F3)'
        path:
          type: string
          description: 'Chemin hiérarchique complet (ex: europe/france)'
        label:
          type: string
          description: 'Label affiché (ex: France)'
        depth:
          type: integer
          description: Profondeur dans la hiérarchie (0=racine)
        parentId:
          type: string
          format: uuid
          nullable: true

    TagDimension:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
          description: Nom unique de la dimension
        description:
          type: string
          nullable: true
        color:
          type: string
          nullable: true
          description: Couleur hexadécimale pour l'UI
        icon:
          type: string
          nullable: true
        multiValue:
          type: boolean
          default: true
          description: Autorise plusieurs tags par entité
        entityScope:
          type: array
          items:
            type: string
          description: Types d'entités concernées
        sortOrder:
          type: integer
          default: 0
        createdAt:
          type: string
          format: date-time

    CreateTagDimensionDto:
      type: object
      required: [name]
      properties:
        name:
          type: string
          description: Nom unique de la dimension
        description:
          type: string
        color:
          type: string
          description: 'Couleur hexadécimale (ex: #2196F3)'
        icon:
          type: string
        multiValue:
          type: boolean
          default: true
        entityScope:
          type: array
          items:
            type: string

    DomainResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        description:
          type: string
          nullable: true
        comment:
          type: string
          nullable: true
        tags:
          type: array
          items:
            $ref: '#/components/schemas/TagValueResponse'
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
          nullable: true

    CreateDomainDto:
      type: object
      required: [name]
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 255
          example: "Finance"
        description:
          type: string
          nullable: true
          maxLength: 2000
        comment:
          type: string
          nullable: true
          maxLength: 2000

    UpdateDomainDto:
      type: object
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 255
        description:
          type: string
          nullable: true
          maxLength: 2000
        comment:
          type: string
          nullable: true
          maxLength: 2000

    ErrorResponse:
      type: object
      properties:
        statusCode:
          type: integer
          example: 409
        code:
          type: string
          example: "CONFLICT"
        message:
          type: string
        timestamp:
          type: string
          format: date-time
        path:
          type: string

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
          example: "user@ark.io"
        password:
          type: string
          minLength: 8
          example: "SecurePass123!"

    LoginResponse:
      type: object
      properties:
        accessToken:
          type: string
          description: JWT access token (15 minutes)
          example: "eyJhbGciOiJIUzI1NiIs..."
        user:
          $ref: '#/components/schemas/UserResponse'

    RefreshResponse:
      type: object
      properties:
        accessToken:
          type: string
          description: Nouveau JWT access token
          example: "eyJhbGciOiJIUzI1NiIs..."
        user:
          $ref: '#/components/schemas/UserResponse'

    UserResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          example: "user@ark.io"
        firstName:
          type: string
          nullable: true
        lastName:
          type: string
          nullable: true
        isActive:
          type: boolean
        role:
          $ref: '#/components/schemas/RoleResponse'
          nullable: true
        createdAt:
          type: string
          format: date-time

    RoleResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
          example: "Admin"
        description:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        permissions:
          type: array
          items:
            type: object
            properties:
              name:
                type: string
                example: "users:write"
              description:
                type: string
                nullable: true

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
